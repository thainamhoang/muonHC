global_vars:
  dataset: era5
  data_root: /scratch/thahoa/climate/era5-climate-learn/data
  output_root: /home/thahoa/muonHC/output
  lr_deg: 5.625
  hr_deg: 1.40625
  var: 2m_temperature
  seed: 3407
  mode: static

data:
  lr_dir: ${global_vars.data_root}/${global_vars.lr_deg}deg/${global_vars.var}
  hr_dir: ${global_vars.data_root}/${global_vars.hr_deg}deg/${global_vars.var}
  stride: 6
  temporal: false
  lr_preload_train: true
  hr_preload_train: false
  lr_preload_eval: true
  hr_preload_eval: true

dataloader:
  batch_size: 64
  train_shuffle: true
  num_workers: 12
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 2

model:
  n_coeff: 64
  in_channels: 1
  embed_dim: 128
  depth: 8
  num_heads: 4
  upscale: 4
  decoder_hidden_dim: 256

training:
  device: cuda
  seed: ${global_vars.seed}
  max_epochs: 50
  patience: 10
  log_interval: 25
  save_dir: ${global_vars.output_root}/${global_vars.dataset}/${global_vars.mode}_stride${data.stride}_seed${global_vars.seed}
  optimizer:
    type: adamw
    lr: 2e-4
    weight_decay: 1e-4
    betas: [0.9, 0.999]
  scheduler:
    type: warmup_cosine
    warmup_epochs: 5
    warmup_start_factor: 0.01
    eta_min: 1e-6
    step_by: step

wandb:
  entity: thainamhoang
  project: muonHC
  name: ${global_vars.dataset}_${global_vars.mode}_stride${data.stride}_seed${global_vars.seed}
  watch: false
